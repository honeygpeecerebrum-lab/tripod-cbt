<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background-color: #333;
        }
        nav a {
            color: white;
            padding: 1rem;
            display: inline-block;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #575757;
        }
        main {
            padding: 2rem;
        }
        .question {
            background-color: white;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .options button {
            display: block;
            width: 100%;
            padding: 0.5rem;
            margin: 0.3rem 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .options button:hover {
            background-color: #ddd;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background-color: #333;
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to the CBT Platform</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Tests</a>
    <a href="#">Results</a>
    <a href="#">Profile</a>
</nav>

<main>
    <div class="question">
        <p><strong>Question 1:</strong> What is the chemical symbol for water?</p>
        <div class="options">
            <button>A. O2</button>
            <button>B. H2O</button>
            <button>C. CO2</button>
            <button>D. NaCl</button>
        </div>
    </div>

    <div class="question">
        <p><strong>Question 2:</strong> Which planet is known as the Red Planet?</p>
        <div class="options">
            <button>A. Earth</button>
            <button>B. Mars</button>
            <button>C. Jupiter</button>
            <button>D. Venus</button>
        </div>
    </div>

    <!-- Add more questions here -->
</main>

<footer>
    &copy; 2026 CBT Platform. All Rights Reserved.
</footer>

</body>
</html>

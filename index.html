<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripod CBT Platform</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
  .card { background-color: #fff; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 2rem; }
  .option:hover { background-color: #e0f2fe; cursor: pointer; }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen"><!-- Landing Section --><div id="landing" class="text-center space-y-6">
  <h1 class="text-4xl font-bold text-blue-600">Tripod CBT</h1>
  <p class="text-gray-700">Welcome! Test your knowledge and see your score at the end.</p>
  <button onclick="startTest()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Start Test</button>
</div><!-- Test Section --><div id="testSection" class="hidden w-full max-w-xl">
  <div class="card space-y-4">
    <div class="flex justify-between items-center">
      <h2 id="questionText" class="text-xl font-semibold"></h2>
      <span id="timer" class="text-red-500 font-bold">05:00</span>
    </div>
    <div id="options" class="space-y-2"></div>
    <div class="flex justify-between mt-4">
      <button onclick="prevQuestion()" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Previous</button>
      <button onclick="nextQuestion()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Next</button>
    </div>
  </div>
</div><!-- Result Section --><div id="resultSection" class="hidden text-center space-y-6">
  <h1 class="text-3xl font-bold text-green-600">Your Score</h1>
  <p id="scoreText" class="text-gray-700 text-xl"></p>
  <button onclick="restartTest()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Restart Test</button>
</div><script>
